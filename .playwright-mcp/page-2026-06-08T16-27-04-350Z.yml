          - strong [ref=e104]: AttackDetector
        - text: (Physical) To detect conditions compatible with enemy attacks (health level decreasing,enemy fire, etc.).
      - paragraph [ref=e105]:
        - strong [ref=e106]:
          - emphasis [ref=e107]: AvoidObstacle
        - text: (Physical) To generate a simple avoiding obstacle behavior.
      - paragraph [ref=e108]:
        - strong [ref=e109]:
          - emphasis [ref=e110]: BackupReflex
        - text: (Physical) To generate a simple backup movement in response to an unexpected collision.
      - paragraph [ref=e111]:
        - strong [ref=e112]:
          - emphasis [ref=e113]: ChasePlayer
        - text: (Mission) To generate a complex chasing player behavior.
      - paragraph [ref=e114]:
        - strong [ref=e115]:
          - emphasis [ref=e116]: EnemyDetector
        - text: (Physical) To detect the presence of an enemy based on given conditions, like previous detection of an attack and presence of other players using their weapons.
      - paragraph [ref=e117]:
        - strong [ref=e118]:
          - emphasis [ref=e119]: GazeGenerator
        - text: (Physical) To generate a simple gaze movement directed towards the focus of attention.
      - paragraph [ref=e120]:
        - strong [ref=e121]:
          - emphasis [ref=e122]: JumpObstacle
        - text: (Physical) To generate a simple jump movement in order to avoid an obstacle.
      - paragraph [ref=e123]:
        - strong [ref=e124]:
          - emphasis [ref=e125]: KeepEnemiesFar
        - text: (Mission) To generate a complex run away movement in order to maximize the distance to detected enemies.
      - paragraph [ref=e126]:
        - strong [ref=e127]:
          - emphasis [ref=e128]: LocationReached
        - text: (Physical) To detect if bot has reached the spatial position marked as goal location.
      - paragraph [ref=e129]:
        - strong [ref=e130]:
          - emphasis [ref=e131]: MoveLooking
        - text: (Physical) To generate a complex movement combining gaze and locomotion.
      - paragraph [ref=e132]:
        - strong [ref=e133]:
