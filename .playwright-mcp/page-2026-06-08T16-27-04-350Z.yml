        - text: (Mission) To decide who is the best enemy to attack to.
      - separator [ref=e150]
      - paragraph [ref=e151]: In our current implementation, specialized processors are created programmatically (see sample code below), and they are also assigned dynamically to their corresponding CERA layer. It is our intention to create a more elegant mechanism for the programmer to define the processors layout (configuration text file or even a GUI).
      - paragraph [ref=e152]: "[…] // ** ATTACK DETECTOR * // Generates a BeingDamaged percept every time the health level decreases _CeraPhysical.RegisterProcessor( new AttackDetector() ); // ** OBSTACLE DETECTOR ** // Generates a Obstacle single percept if there is any obstacle in the // direction of the movement _CeraPhysical.RegisterProcessor( new ObstacleDetector() ); // ** EMEMY DETECTOR ** // Generates a Enemy Attacking complex percept every time the bot is // being damaged and possible culprit/s are detected. _CeraMission.RegisterProcessor( new EnemyDetector() ); […]"
      - heading "Conscious-Robots Bot in action" [level=2] [ref=e153]
      - paragraph [ref=e154]: "The following is an excerpt of a typical flow of percepts that ultimately generates the bot’s behavior (see Figure 7):"
      - list [ref=e155]:
        - listitem [ref=e156]: The processor EnemyDetector detects a new enemy, and creates a new “enemy detected” percept.
        - listitem [ref=e157]: The “enemy detected” percept is in turn received by the SelecEnemyToShoot processor, which is in charge of selecting the enemy to shoot. When an enemy is selected, the corresponding fire action is generated.
        - listitem [ref=e158]: Two processors receive the fire action, one in charge of aiming at the enemy and shoot, and other that creates new movement actions to avoid enemy fire.
        - listitem [ref=e159]: As the new movement actions have more priority than actions triggered by other processors, like the RandomMove processor, these actions are more likely to be executed.
      - paragraph [ref=e160]: This is a very simple example that how the bot works. However, it is usual to have much more complex scenarios in which several enemies are attacking the bot simultaneously, and the selected target might be any of them. In these cases, the attention mechanism plays a key role. CERA-CRANIUM implements an attention mechanism based on active contexts. Percepts that are closer to currently active context are more likely to be selected and further processed. This helps maintaining more coherent sequences of actions.
      - paragraph [ref=e161]:
        - text: "The following video shows the bot in action:"
        - link "https://www.youtube.com/watch?v=9pmYPROqoxM" [ref=e162] [cursor=pointer]:
          - /url: https://www.youtube.com/watch?v=9pmYPROqoxM
      - paragraph [ref=e163]
      - heading "Future Work" [level=2] [ref=e164]
      - paragraph [ref=e165]: CC-Bot2 is actually a partial implementation of the CERA-CRANIUM model. Our Machine Consciousness model includes much more cognitive functionality that is unimplemented so far. It is our aim to enhance the current implementation with new features like a model of emotions, episodic memory, different types of learning mechanisms, and even a model of the self. After a hard work, we expect CC-Bot3 to be a much more human-like bot. We also plan to use the same design for other games like TORCS or Mario.
      - paragraph [ref=e166]: Although CC-Bot2 could not completely pass the Turing test, it achieved the highest humanness rating (31.8%). As of today, the Turing test level intelligence has never been achieved by a machine. There is still a long way to go in order to build artificial agents that are clever enough to parallel human behavior. Nevertheless, we think we are working in a very promising research line to achieve this ambitious goal.
