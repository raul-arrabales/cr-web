        - text: (Physical) To generate a simple movement towards a given location.
      - paragraph [ref=e135]:
        - strong [ref=e136]:
          - emphasis [ref=e137]: ObstacleDetector
        - text: (Physical) To detect the presence of an obstacle (which might prevent the bot to follow her path).
      - paragraph [ref=e138]:
        - strong [ref=e139]:
          - emphasis [ref=e140]: RandomNavigation
        - text: (Physical) To generate a complex random wandering movement.
      - paragraph [ref=e141]:
        - strong [ref=e142]:
          - emphasis [ref=e143]: RunAwayFromPlayers
        - text: (Mission) To generate a complex movement to run away from certain players.
      - paragraph [ref=e144]:
        - strong [ref=e145]:
          - emphasis [ref=e146]: SelectBestWeapon
        - text: (Mission) To select the best weapon currently available.
      - paragraph [ref=e147]:
        - strong [ref=e148]:
